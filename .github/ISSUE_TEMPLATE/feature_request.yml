name: Feature request
description: Suggest something new — UX, performance, integration, etc.
title: "[Feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for thinking about how to make Warp Mobile better. A few notes
        before you fill this in:

        **Solo-dev scope reality**: this is a 1-person AGPL-3.0 project on a
        12-18 month constrained-beta timeline. Big features may end up
        deferred to v2+ or marked "won't fix" if they conflict with the
        chosen architecture (warpui Vulkan, not Compose; Termux runtime,
        not chroot; flagship-class first).

        See [`CLAUDE.md`](https://github.com/ImL1s/warp-mobile-android/blob/main/CLAUDE.md)
        and [`.omc/v1-release-kickoff.md`](https://github.com/ImL1s/warp-mobile-android/blob/main/.omc/v1-release-kickoff.md)
        for what's in the v1 + v1+1 plan vs explicitly out-of-scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the user-side pain point, not the implementation.
        "I can't [thing]" is more useful than "we should add [feature]".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would the solution look like?
      description: |
        Rough sketch is fine. Mockups + screenshots help if it's UX.
        If you have a specific implementation in mind, mention the
        files/commits it would touch.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, other apps that solve this differently, etc.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope estimate
      description: Rough — we'll re-estimate during triage.
      options:
        - "Small — UI tweak, single file, <1 day"
        - "Medium — new module / view, 1-3 days"
        - "Large — architectural change, 1+ weeks"
        - "Not sure"
    validations:
      required: true

  - type: checkboxes
    id: scope_check
    attributes:
      label: Compatibility
      description: Tick all that apply
      options:
        - label: This works with the Vulkan-warpui rendering path (not Compose)
        - label: This works on flagship Android (Adreno 6xx+, API 31+) — no low-end-only flag
        - label: This is AGPL-3.0-compatible (no GPL-only deps, no proprietary SDKs)
        - label: This doesn't fork termux-app (we bundle termux-packages only)
