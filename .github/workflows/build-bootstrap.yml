name: Build Termux Bootstrap (M4-S03)

# Triggered on push to the workflow file or the package list, and via manual
# dispatch. The script under `tools/scripts/build-bootstrap.sh` is the same
# logic used locally — see README "Building from source".
#
# Strategy (per .omc/m4-artifacts/M4-S03-strategy.md, decided after 3 failed
# source-compile attempts that hit an Android SDK install bug inside the
# termux-packages docker container on GHA's 14 GB-disk runners):
#   - Download upstream Termux .debs from packages-cf.termux.dev (free, fast).
#   - Retarget paths com.termux → dev.warp.mobile in text files.
#   - ELF binary path patching is deferred to M4-S05 atomic extractor.

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        required: true
        default: aarch64
        type: choice
        options:
          - aarch64
          - arm
          - i686
          - x86_64
  push:
    paths:
      - '.github/workflows/build-bootstrap.yml'
      - 'tools/scripts/build-bootstrap.sh'
      - 'tools/scripts/m4-bootstrap-packages.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install minimal tooling
        run: |
          # ubuntu-latest already has python3, curl, zip, unzip, tar, xz, file,
          # sha256sum, find, sed, grep, awk. Nothing else needed — no docker,
          # no Android SDK, no rust toolchain.
          for cmd in python3 curl zip unzip tar xz file sha256sum; do
            command -v "$cmd" >/dev/null || { echo "missing: $cmd"; exit 1; }
          done
          echo "Toolchain OK"

      - name: Build bootstrap zip
        env:
          ARCH: ${{ inputs.arch || 'aarch64' }}
        run: |
          ./tools/scripts/build-bootstrap.sh "$ARCH" \
              tools/scripts/m4-bootstrap-packages.txt \
              "$PWD/_bootstrap-out"

      - name: Verify zip artifact
        env:
          ARCH: ${{ inputs.arch || 'aarch64' }}
        run: |
          ZIP="_bootstrap-out/bootstrap-${ARCH}.zip"
          META="_bootstrap-out/bootstrap-metadata.json"
          if [ ! -f "$ZIP" ] || [ ! -f "$META" ]; then
            echo "FAIL: missing artifact ($ZIP) or metadata ($META)"
            exit 1
          fi
          SIZE_MB=$(jq -r '.size_mb' "$META")
          # M4-S03 zip-size envelope (ralplan §6 M4 #1): 30-50MB for the full
          # 7-package list. Our smoke test with 2 packages was 22MB; full set
          # should land in range.
          if [ "$SIZE_MB" -lt 15 ] || [ "$SIZE_MB" -gt 80 ]; then
            echo "WARN: zip size ${SIZE_MB} MB outside expected 30-50 MB range"
          fi
          echo "PASS: artifact present, ${SIZE_MB} MB"
          jq . "$META"

      - name: Verify retargeting (M4-S02 audit)
        run: |
          # Hard constraint from M4-S02: 0 com.termux in shell scripts/configs.
          # Use grep -F (literal, not regex) so the dot in com.termux does not
          # wildcard-match `com/termux` in URLs (github.com/termux/...).
          REMAINING=$(jq -r '.text_files_rewritten' _bootstrap-out/bootstrap-metadata.json)
          BIN_REMAINING=$(jq -r '.files_with_upstream_app_id_remaining' _bootstrap-out/bootstrap-metadata.json)
          echo "Text files rewritten: $REMAINING"
          echo "Binary files with com.termux remaining (M4-S05 deferred): $BIN_REMAINING"
          if [ "$REMAINING" -lt 1 ]; then
            echo "FAIL: zero text rewrites — retargeting broken"
            exit 1
          fi
          echo "PASS: retargeting applied to $REMAINING text files"

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ inputs.arch || 'aarch64' }}
          path: |
            _bootstrap-out/bootstrap-*.zip
            _bootstrap-out/bootstrap-metadata.json
          retention-days: 30
