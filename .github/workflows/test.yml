name: Test (Rust + Android smoke)

# Continuous correctness CI for the warp-mobile-android source tree.
#
# What this catches:
#   - Rust host tests (warp-mobile-android-host: 66 tests including
#     pty / ime / input / terminal_model / bootstrap / font_picker)
#   - Rust AI client tests (warp_ai_mobile: 18 tests for SSE parser +
#     redact + scrub_key + smoke)
#   - Rust facade tests (warp_terminal_mobile_facade in warp-src/:
#     ~73 tests for DCS hooks + Block model + dynamic_grid)
#   - Android Kotlin compile (gradle :app:compileDebugKotlin —
#     catches Kotlin syntax regressions without device tests, since
#     the Android side currently has no JUnit suite; instrumentation
#     tests via test-*.sh drivers are device-only)
#
# What this does NOT catch (deliberate scope):
#   - Device-driver scripts (tools/scripts/test-*.sh) — those need
#     a connected adb device; CI runners don't have hardware
#   - Vulkan / Skia render output — needs GPU + system fonts
#   - Bootstrap zip build — covered by build-bootstrap.yml
#   - Release pipeline — covered by release.yml
#
# Triggers: push to main + PR. Cancels superseded runs in the same
# PR via concurrency: cancel-in-progress.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt JavaScript actions into Node.js 24 ahead of GitHub's June 2026
  # forced switch (Node 20 removal on September 16, 2026). Surfaces any
  # action incompatibility now rather than at the deprecation cliff.
  # Refs: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust:
    name: Rust unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone warp-src fork
        # Clone INTO the repo root at warp-src/ (not ../warp-src). The
        # cargo path dep in crates/android-host/Cargo.toml is
        # `../../warp-src/...` which resolves to <repo_root>/warp-src/.
        # The F-Droid recipe clones to `../warp-src` because its build
        # runs from `subdir: android`, so its `../` IS the repo root —
        # but GHA checkout sits at the repo root by default, so we drop
        # the `../`.
        run: |
          git clone https://github.com/ImL1s/warp warp-src \
            --branch warp-mobile/m0-facade --depth 1

      # NOTE: this job does NOT call tools/scripts/setup-cargo-config.sh.
      # That script renders .cargo/config.toml from a template using
      # ANDROID_NDK_ROOT for cross-compilation to aarch64-linux-android.
      # Host tests don't cross-compile (no --target flag), so they don't
      # need the rendered config. Skipping the script avoids a dependency
      # on NDK install in this job.

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            warp-src/target
          # Bump key when Cargo.lock or workspace structure changes
          # to force a clean rebuild. Otherwise reuse the cached
          # artifacts across PR runs.
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test warp-mobile-android-host (66 tests)
        run: cargo test -p warp-mobile-android-host --no-fail-fast

      - name: Test warp_ai_mobile (18 tests)
        run: cargo test -p warp_ai_mobile --no-fail-fast

      - name: Test warp_terminal_mobile_facade (~73 tests)
        # warp-src is its own workspace; --manifest-path points cargo
        # at the cloned fork's Cargo.toml. The path is `warp-src/Cargo.toml`
        # since we cloned INTO the repo root above.
        run: |
          cargo test -p warp_terminal_mobile_facade \
            --manifest-path warp-src/Cargo.toml \
            --no-fail-fast

  android-compile:
    name: Android Kotlin compile (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone warp-src fork
        run: |
          git clone https://github.com/ImL1s/warp warp-src \
            --branch warp-mobile/m0-facade --depth 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r29
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"
          # Export ANDROID_NDK_ROOT for setup-cargo-config.sh below
          # (the sdkmanager install path is well-known + deterministic).
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/29.0.13113456" >> "$GITHUB_ENV"

      - name: Render Cargo config
        # Runs AFTER NDK install (the script validates the NDK path).
        run: bash tools/scripts/setup-cargo-config.sh

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Compile Kotlin (debug)
        run: |
          cd android
          ./gradlew :app:compileDebugKotlin
